    <title>Fluido — draw, guess, win</title>

    <style>
      /* CRITICAL: Prevent iOS/Android from blocking input focus */
      * {
        -webkit-tap-highlight-color: transparent;
      }

        font-size: 16px !important; /* Prevents iOS zoom on focus */

      body.modal-open {
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
      }
    </style>
